name: Overseas Trend Radar

concurrency:
  group: overseas-trend-radar-daily
  cancel-in-progress: false

on:
  schedule:
    - cron: '20 1 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date in YYYY-MM-DD"
        required: false
        type: string
      skip_if_already_sent:
        description: "Skip if today's report was already delivered"
        required: false
        default: true
        type: boolean

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      ENABLE_REMOTE_TRANSLATION: "1"
      ENGLISH_OUTPUT_MODE: "0"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_TIMEOUT: "180"
      REPORT_HOUR: "9"
      REPORT_MINUTE: "20"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: overseas-trend-radar-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            overseas-trend-radar-state-${{ github.ref_name }}-

      - name: Run report
        shell: bash
        run: |
          set -euo pipefail
          ARGS=("--send")
          if [[ "${{ github.event.inputs.skip_if_already_sent || 'true' }}" == "true" ]]; then
            ARGS+=("--skip-if-already-sent")
          fi
          if [[ -n "${{ github.event.inputs.report_date || '' }}" ]]; then
            ARGS+=("--date" "${{ github.event.inputs.report_date }}")
          fi
          python3 main.py "${ARGS[@]}"

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: overseas-trend-radar-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-output
          retention-days: 3
          path: |
            data/last_report.md
            data/last_card.json
            data/state.json
            data/raw_candidates.json
            data/filtered_candidates.json
            data/scored_candidates.json
            data/final_selected.json
            data/llm_selected.json
            data/quality_errors.json
